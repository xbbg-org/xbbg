[package]
name = "xbbg_core"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "Rust core for xbbg Python package (PyO3)"
repository = "https://github.com/alpha-xone/xbbg"

[lib]
name = "xbbg_core"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py310"] }


