# Exchange & Market Definitions
# =============================
# Single source of truth for exchange session rules, exchange code mappings,
# and country-to-timezone fallbacks.
#
# Used by Rust (compiled in via `include_str!`) and optionally by codegen.
#
# Session rules define how to derive pre/post/am/pm windows from
# Bloomberg's regular trading hours for each exchange.


# ============================================================================
# Market Rules by MIC Code (ISO 10383)
# ============================================================================
# Each entry defines session derivation parameters:
#   pre_minutes       – minutes before day_start for pre-market session
#   post_minutes      – minutes after day_end for post-market session
#   lunch_start_min   – minutes from day_start to lunch break start (Asian markets)
#   lunch_end_min     – minutes from day_start to lunch break end
#   is_continuous     – true for 23-hour futures markets (no extended hours concept)
#
# Omitted fields default to 0 / null / false.

# --- US Equities (5.5h pre, 4h post) ---
# Day: 09:30–16:00, Pre: 04:00–09:30, Post: 16:00–20:00
[mic.XNYS]
pre_minutes = 330
post_minutes = 240

[mic.XNGS]
pre_minutes = 330
post_minutes = 240

