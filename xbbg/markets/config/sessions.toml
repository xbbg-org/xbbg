# =========================================================================
# Hong Kong - Lunch break 12:00-13:00 (150 min from 9:30 open)
# Day: 9:30-16:00, AM: 9:30-12:00, PM: 13:00-16:00
# Pre: 8:45-9:30 (45 min), Post: 16:00-16:15 (15 min)
# =========================================================================
