# Market session rules for deriving extended hours from Bloomberg regular hours.
#
# Each exchange (by MIC code or Bloomberg exchange code) defines offsets
# in minutes relative to the regular trading hours Bloomberg provides.
#
# Fields:
#   pre_minutes         - Minutes before day_start for pre-market (default: 0)
#   post_minutes        - Minutes after day_end for post-market (default: 0)
#   lunch_start_minutes - Minutes from day_start where lunch begins (Asian markets)
#   lunch_end_minutes   - Minutes from day_start where lunch ends
#   is_continuous       - True for 23-hour futures markets (no extended hours)

# =============================================================================
# MIC Rules
# =============================================================================

# =========================================================================
# US Equities - Extended hours: 5.5h pre-market, 4h post-market
# Day: 9:30-16:00, Pre: 4:00-9:30, Post: 16:00-20:00
# =========================================================================
[mic.XNYS]
pre_minutes = 330
post_minutes = 240

[mic.XNGS]
pre_minutes = 330
post_minutes = 240

[mic.XASE]
pre_minutes = 330
post_minutes = 240

[mic.ARCX]
pre_minutes = 330
post_minutes = 240

[mic.BATS]
pre_minutes = 330
post_minutes = 240

[mic.IEXG]
pre_minutes = 330
post_minutes = 240

# =========================================================================
# Japanese Equities - Lunch break 11:30-12:30 (150 min from 9:00 open)
# Day: 9:00-15:00, AM: 9:00-11:30, PM: 12:30-15:00
# Pre: 8:00-9:00 (60 min), Post: 15:00-15:30 (30 min)
# =========================================================================
[mic.XTKS]
pre_minutes = 60
post_minutes = 30
lunch_start_minutes = 150
lunch_end_minutes = 210

[mic.XOSE]
pre_minutes = 60
