name: CI

on:
  pull_request:
  push:
    branches: [main, feat/**, fix/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Detect latest Bloomberg SDK version
  # ════════════════════════════════════════════════════════════════════════════
  sdk-version:
    name: Detect SDK Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Detect latest blpapi version
        id: detect
        run: |
          VERSION=$(curl -s https://blpapi.bloomberg.com/repository/releases/python/simple/blpapi/ \
            | grep -oP 'blpapi-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          echo "Detected Bloomberg SDK version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # Lint (fast, no SDK needed)
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false  # No compilation in lint job

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Python lint
        run: uvx ruff check .

      - name: Python format check
        run: uvx ruff format --check .

  # ════════════════════════════════════════════════════════════════════════════
  # Security audit (no SDK needed)
  # ════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false  # No compilation in security job

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

      - name: Dependency policy check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # ════════════════════════════════════════════════════════════════════════════
  # Build wheels (matrix: OS)
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.target }})
    needs: sdk-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sdk-platform: linux
            sdk-ext: tar.gz
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sdk-platform: windows
            sdk-ext: zip
          # NOTE: macOS builds disabled - C++ SDK not publicly available
          # - os: macos-14
          #   target: aarch64-apple-darwin
          #   sdk-platform: macos
          #   sdk-ext: tar.gz
          # - os: macos-15
          #   target: x86_64-apple-darwin
          #   sdk-platform: macos
          #   sdk-ext: tar.gz

    runs-on: ${{ matrix.os }}
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y libclang-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          components: clippy
          rustflags: ""  # Don't override RUSTFLAGS, let clippy use -D warnings

      - name: Download Bloomberg SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1
          # SDK has Linux/ instead of lib/, create symlink for build.rs
          ln -s "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          # Debug: show library files
          echo "SDK contents:" && ls -la "$HOME/blpapi/lib/"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$HOME/blpapi/lib:$LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Download Bloomberg SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkUrl = "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ env.BLPAPI_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile blpapi.zip
          Expand-Archive -Path blpapi.zip -DestinationPath C:\blpapi
          $sdkPath = (Get-ChildItem C:\blpapi -Directory)[0].FullName
          echo "BLPAPI_ROOT=$sdkPath" >> $env:GITHUB_ENV

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        # Note: Rust tests require Bloomberg terminal connection, skipped in CI

      - name: Install cargo-geiger
        if: runner.os == 'Linux'
        run: cargo install cargo-geiger --locked

      - name: Unsafe code audit
        if: runner.os == 'Linux'
        run: cargo geiger --all-features --all-targets || true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # ════════════════════════════════════════════════════════════════════════════
  # Test wheels (matrix: OS × Python version)
  # ════════════════════════════════════════════════════════════════════════════
  test:
    name: Test (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Install wheel and test dependencies
        run: |
          uv pip install --system --find-links dist xbbg
          uv pip install --system pytest pytest-cov

      - name: Run tests
        run: pytest py-xbbg/tests -v

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: pytest py-xbbg/tests --cov=xbbg --cov-report=xml -v

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════════════════════════
  # Static Analysis (requires SDK)
  # ════════════════════════════════════════════════════════════════════════════
  analysis:
    name: Static Analysis
    needs: sdk-version
    runs-on: ubuntu-latest
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y libclang-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable, nightly
          components: rust-src
          rustflags: ""

      - name: Download Bloomberg SDK
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1
          ln -s "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check unused dependencies
        run: cargo +nightly udeps --all-targets 2>&1 || true

      - name: Install lockbud
        run: cargo install lockbud --locked || true

      - name: Deadlock detection
        run: cargo lockbud -k deadlock 2>&1 || true

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: SemVer check
        run: cargo semver-checks check-release 2>&1 || true

  # ════════════════════════════════════════════════════════════════════════════
  # Kani verification (unsafe code model checking)
  # ════════════════════════════════════════════════════════════════════════════
  kani:
    name: Kani Verification
    needs: sdk-version
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y libclang-dev

      - name: Download Bloomberg SDK
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1
          ln -s "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"

      - name: Setup Kani
        uses: model-checking/kani-github-action@v1
        with:
          args: --workspace --exclude blpapi-sys --exclude pyo3-xbbg 2>&1 || true

  # ════════════════════════════════════════════════════════════════════════════
  # CI Status (aggregation gate)
  # ════════════════════════════════════════════════════════════════════════════
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, security, build, test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
