name: CI

on:
  pull_request:
  push:
    branches: [main, feat/**, fix/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Detect latest Bloomberg SDK version (runs first, others depend on it)
  # ════════════════════════════════════════════════════════════════════════════
  sdk-version:
    name: Detect SDK Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Detect latest blpapi version
        id: detect
        run: |
          VERSION=$(curl -s https://blpapi.bloomberg.com/repository/releases/python/simple/blpapi/ \
            | grep -oP 'blpapi-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          echo "Detected Bloomberg SDK version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # Rust Lint (fast, no SDK needed)
  # ════════════════════════════════════════════════════════════════════════════
  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false

      - name: Rust format check
        run: cargo fmt --all -- --check

  # ════════════════════════════════════════════════════════════════════════════
  # Python Lint (fast, no SDK needed)
  # ════════════════════════════════════════════════════════════════════════════
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Python lint
        run: uvx ruff check .

      - name: Python format check
        run: uvx ruff format --check .

  # ════════════════════════════════════════════════════════════════════════════
  # Security - cargo-audit (vulnerabilities)
  # ════════════════════════════════════════════════════════════════════════════
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y cargo-audit && cargo audit

  # ════════════════════════════════════════════════════════════════════════════
  # Security - cargo-deny (licenses, bans, sources)
  # ════════════════════════════════════════════════════════════════════════════
  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y cargo-deny && cargo deny check

  # ════════════════════════════════════════════════════════════════════════════
  # Check (clippy) - runs once per OS to validate code
  # ════════════════════════════════════════════════════════════════════════════
  check:
    name: Check (${{ matrix.os }})
    needs: sdk-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          components: clippy
          rustflags: ""

      - name: Cache Bloomberg SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/blpapi
          key: blpapi-${{ runner.os }}-${{ env.BLPAPI_VERSION }}

      - name: Download Bloomberg SDK (Linux)
        if: runner.os == 'Linux' && steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1

      - name: Setup Bloomberg SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          # SDK has Linux/ instead of lib/, create symlinks
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Download Bloomberg SDK (Windows)
        if: runner.os == 'Windows' && steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $sdkUrl = "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ env.BLPAPI_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile blpapi.zip
          Expand-Archive -Path blpapi.zip -DestinationPath $HOME/blpapi

      - name: Setup Bloomberg SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkPath = (Get-ChildItem $HOME/blpapi -Directory)[0].FullName
          echo "BLPAPI_ROOT=$sdkPath" >> $env:GITHUB_ENV

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ════════════════════════════════════════════════════════════════════════════
  # Build wheels (matrix: OS × Python version)
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build (Python ${{ matrix.python }}, ${{ matrix.target }})
    needs: [sdk-version, check]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest]
        target: [x86_64-unknown-linux-gnu, x86_64-pc-windows-msvc]
        exclude:
          # Linux target only on ubuntu
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
          # Windows target only on windows
          - os: windows-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Cache Bloomberg SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/blpapi
          key: blpapi-${{ runner.os }}-${{ env.BLPAPI_VERSION }}

      - name: Download Bloomberg SDK (Linux)
        if: runner.os == 'Linux' && steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1

      - name: Setup Bloomberg SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Download Bloomberg SDK (Windows)
        if: runner.os == 'Windows' && steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $sdkUrl = "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ env.BLPAPI_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile blpapi.zip
          Expand-Archive -Path blpapi.zip -DestinationPath $HOME/blpapi

      - name: Setup Bloomberg SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkPath = (Get-ChildItem $HOME/blpapi -Directory)[0].FullName
          echo "BLPAPI_ROOT=$sdkPath" >> $env:GITHUB_ENV

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i ${{ matrix.python }}
          # Use manylinux_2_28 (AlmaLinux 8) for modern LLVM
          manylinux: "2_28"
          # Install git, clang and SDK inside manylinux container
          before-script-linux: |
            dnf install -y git clang-devel
            git config --global --add safe.directory /io
            mkdir -p /opt/blpapi
            curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ env.BLPAPI_VERSION }}-linux.tar.gz" \
              | tar -xz -C /opt/blpapi --strip-components=1
            ln -sf /opt/blpapi/Linux /opt/blpapi/lib
            ln -sf /opt/blpapi/lib/libblpapi3_64.so /opt/blpapi/lib/libblpapi3.so
          docker-options: -e BLPAPI_ROOT=/opt/blpapi -e LIBRARY_PATH=/opt/blpapi/lib

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}-py${{ matrix.python }}
          path: dist/*.whl

  # ════════════════════════════════════════════════════════════════════════════
  # Test wheels (matrix: OS × Python version)
  # ════════════════════════════════════════════════════════════════════════════
  test:
    name: Test (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Install blpapi from Bloomberg
        run: uv pip install --system --index-url https://blpapi.bloomberg.com/repository/releases/python/simple/ blpapi

      - name: Install wheel and test dependencies
        run: |
          uv pip install --system --no-index --find-links dist xbbg
          uv pip install --system pytest pytest-cov

      - name: Copy tests to temp directory
        # Run from temp dir to avoid importing local source instead of installed package
        run: |
          mkdir -p "${{ runner.temp }}/test-run"
          cp -r py-xbbg/tests "${{ runner.temp }}/test-run/"
        shell: bash

      - name: Run tests
        working-directory: ${{ runner.temp }}/test-run
        run: pytest tests -v

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        working-directory: ${{ runner.temp }}/test-run
        run: pytest tests --cov=xbbg --cov-report=xml -v

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════════════════════════
  # Unused Dependencies (optional, non-blocking)
  # ════════════════════════════════════════════════════════════════════════════
  udeps:
    name: Unused Deps
    needs: sdk-version
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          rustflags: ""

      - name: Cache Bloomberg SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/blpapi
          key: blpapi-Linux-${{ env.BLPAPI_VERSION }}

      - name: Download Bloomberg SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1

      - name: Setup Bloomberg SDK
        run: |
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - uses: cargo-bins/cargo-binstall@main
      - run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo binstall -y --force cargo-udeps
          rustup run nightly cargo-udeps --all-targets

  # ════════════════════════════════════════════════════════════════════════════
  # Unsafe Code Audit (optional, non-blocking)
  # ════════════════════════════════════════════════════════════════════════════
  geiger:
    name: Unsafe Audit
    needs: sdk-version
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Cache Bloomberg SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/blpapi
          key: blpapi-Linux-${{ env.BLPAPI_VERSION }}

      - name: Download Bloomberg SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1

      - name: Setup Bloomberg SDK
        run: |
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - uses: cargo-bins/cargo-binstall@main
      - name: Run cargo-geiger
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo binstall -y --force cargo-geiger
          for crate in blpapi-sys xbbg-core xbbg-async pyo3-xbbg; do
            echo "=== $crate ==="
            cargo-geiger --manifest-path "$GITHUB_WORKSPACE/crates/$crate/Cargo.toml"
          done

  # ════════════════════════════════════════════════════════════════════════════
  # Semver Compatibility (optional, non-blocking)
  # ════════════════════════════════════════════════════════════════════════════
  semver:
    name: Semver Check
    needs: sdk-version
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for baseline

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Cache Bloomberg SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/blpapi
          key: blpapi-Linux-${{ env.BLPAPI_VERSION }}

      - name: Download Bloomberg SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1

      - name: Setup Bloomberg SDK
        run: |
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - uses: cargo-bins/cargo-binstall@main
      - name: Run cargo-semver-checks
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo binstall -y --force cargo-semver-checks
          # Check if Rust crates directory exists in main branch
          if git show origin/main:crates/xbbg-core/Cargo.toml >/dev/null 2>&1; then
            cargo-semver-checks --baseline-rev origin/main
          else
            echo "Skipping: Rust crates not in baseline yet (will run after merge to main)"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Kani Verification (optional, non-blocking)
  # ════════════════════════════════════════════════════════════════════════════
  kani:
    name: Kani
    needs: sdk-version
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Cache Bloomberg SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/blpapi
          key: blpapi-Linux-${{ env.BLPAPI_VERSION }}

      - name: Download Bloomberg SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1

      - name: Setup Bloomberg SDK
        run: |
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"

      - name: Run Kani
        uses: model-checking/kani-github-action@v1
        with:
          args: --workspace --exclude blpapi-sys --exclude pyo3-xbbg

  # ════════════════════════════════════════════════════════════════════════════
  # CI Status (required gate for merging)
  # ════════════════════════════════════════════════════════════════════════════
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint-rust, lint-python, audit, deny, check, build, test]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.lint-rust.result }}" != "success" ]] || \
             [[ "${{ needs.lint-python.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.deny.result }}" != "success" ]] || \
             [[ "${{ needs.check.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            echo "  lint-rust: ${{ needs.lint-rust.result }}"
            echo "  lint-python: ${{ needs.lint-python.result }}"
            echo "  audit: ${{ needs.audit.result }}"
            echo "  deny: ${{ needs.deny.result }}"
            echo "  check: ${{ needs.check.result }}"
            echo "  build: ${{ needs.build.result }}"
            echo "  test: ${{ needs.test.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed!"
