name: Update CHANGELOG

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Get release date
        id: date
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          echo "date=${RELEASE_DATE}" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "${{ steps.version.outputs.tag }}" | tail -1)
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DATE="${{ steps.date.outputs.date }}"
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          
          # Get commits between tags
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..${TAG} --oneline --pretty=format:"- %s" | grep -v "^- docs(" | grep -v "^- ci(" | head -20)
          else
            COMMITS=$(git log ${TAG} --oneline --pretty=format:"- %s" | head -20)
          fi
          
          # Create changelog entry
          cat > /tmp/new_entry.md << EOF
          ## [${VERSION}] - ${DATE}
          
          ${COMMITS}
          
          **Full Changelog**: https://github.com/alpha-xone/xbbg/compare/${PREV_TAG}...${TAG}
          
          EOF

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          
          # Check if CHANGELOG.md exists
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found, skipping update"
            exit 0
          fi
          
          # Insert new entry after "## [Unreleased]" section
          awk -v new="$(cat /tmp/new_entry.md)" '
            /^## \[Unreleased\]/ {
              print
              getline
              while ($0 !~ /^## \[/) {
                print
                getline
              }
              print new
            }
            {print}
          ' CHANGELOG.md > /tmp/CHANGELOG.md.new
          
          mv /tmp/CHANGELOG.md.new CHANGELOG.md
          
          # Update version links at bottom
          if ! grep -q "\[${VERSION}\]:" CHANGELOG.md; then
            sed -i "/^\[Unreleased\]:/a [${VERSION}]: https://github.com/alpha-xone/xbbg/releases/tag/${TAG}" CHANGELOG.md
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(CHANGELOG): add entry for ${{ steps.version.outputs.version }}"
          title: "docs: Update CHANGELOG for ${{ steps.version.outputs.version }}"
          body: |
            Automated CHANGELOG update for release ${{ steps.version.outputs.version }}
            
            This PR was automatically generated by the update_changelog workflow.
            
            Release: ${{ github.event.release.html_url }}
          branch: changelog-${{ steps.version.outputs.version }}
          delete-branch: true
          labels: documentation
