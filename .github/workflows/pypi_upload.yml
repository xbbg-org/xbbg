name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (build but don't publish)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Detect latest Bloomberg SDK version
  # ════════════════════════════════════════════════════════════════════════════
  sdk-version:
    name: Detect SDK Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Detect latest blpapi version
        id: detect
        run: |
          VERSION=$(curl -s https://blpapi.bloomberg.com/repository/releases/python/simple/blpapi/ \
            | grep -oP 'blpapi-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          echo "Detected Bloomberg SDK version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # Build wheels via setuptools-rust (Linux x64, Windows x64) × Python versions
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: sdk-version
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    env:
      BLPAPI_VERSION: ${{ needs.sdk-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs full git history for version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download Bloomberg SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$HOME/blpapi"
          curl -sSL "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${BLPAPI_VERSION}-linux.tar.gz" \
            | tar -xz -C "$HOME/blpapi" --strip-components=1
          ln -sf "$HOME/blpapi/Linux" "$HOME/blpapi/lib"
          ln -sf "$HOME/blpapi/lib/libblpapi3_64.so" "$HOME/blpapi/lib/libblpapi3.so"
          echo "BLPAPI_ROOT=$HOME/blpapi" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/blpapi/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Download Bloomberg SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkUrl = "https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ env.BLPAPI_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile blpapi.zip
          Expand-Archive -Path blpapi.zip -DestinationPath C:\blpapi
          $sdkPath = (Get-ChildItem C:\blpapi -Directory)[0].FullName
          echo "BLPAPI_ROOT=$sdkPath" >> $env:GITHUB_ENV

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Install build dependencies
        run: pip install setuptools>=77 wheel "setuptools-scm>=8" "setuptools-rust>=1.11"

      - name: Build wheel
        run: pip wheel . --no-deps --wheel-dir dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  # ════════════════════════════════════════════════════════════════════════════
  # Build source distribution
  # ════════════════════════════════════════════════════════════════════════════
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs full git history for version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  # ════════════════════════════════════════════════════════════════════════════
  # Publish to PyPI
  # ════════════════════════════════════════════════════════════════════════════
  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry-run
    environment: pypi
    permissions:
      id-token: write  # Trusted publishing (OIDC)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ════════════════════════════════════════════════════════════════════════════
  # Attach wheels to GitHub Release (created by semantic_version.yml)
  # ════════════════════════════════════════════════════════════════════════════
  release-assets:
    name: Attach Release Assets
    needs: [build, sdist, publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry-run
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
