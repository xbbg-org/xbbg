[package]
name = "pyo3-xbbg"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "PyO3 bindings for xbbg-core"
repository = "https://github.com/alpha-xone/xbbg"

[lib]
name = "xbbg_core"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py310"] }
xbbg_core = { path = "../xbbg-core" }


