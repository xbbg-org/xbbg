[package]
name = "xbbg_core"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "Rust core for xbbg Python package (PyO3)"
repository = "https://github.com/alpha-xone/xbbg"

[lib]
name = "xbbg_core"

[features]
default = []
event-log = []
live = []
schema-debug = []

[dependencies]
thiserror = "2.0"
tracing = { version = "0.1", features = ["log"] }
blpapi-sys = { path = "../blpapi-sys" }
anyhow = "1.0"
once_cell = "1.19"
chrono = "0.4.42"
arrow = "57.1.0"
