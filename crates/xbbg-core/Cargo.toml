[package]
name = "xbbg_core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Rust core for xbbg Python package (PyO3)"

[lib]
name = "xbbg_core"

[features]
default = []
event-log = []
live = []
schema-debug = []

[dependencies]
thiserror = "2.0"
blpapi-sys = { path = "../blpapi-sys" }
anyhow = "1.0"
once_cell = "1.19"
chrono = { version = "0.4.42", features = ["serde"] }
arrow = "57.1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
