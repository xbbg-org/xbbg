loaders:
  - type: python
    search_path:
      - py-xbbg/src
    modules:
      - xbbg.blp
      - xbbg.services
      - xbbg.exceptions
      - xbbg.field_cache
      - xbbg.schema

processors:
  - type: filter
    expression: not name.startswith('_') and default() and not name in ['logger']
  - type: google
  - type: crossref

renderer:
  type: markdown
  descriptive_class_title: false
  add_module_prefix: false
  render_toc: false
  header_level_by_type:
    module: 1
    class: 2
    function: 3
    method: 4
