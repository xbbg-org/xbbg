[workspace]
name = "xbbg"
description = "Intuitive Bloomberg data API"
# Conda packages below resolve from conda-forge only (see `channels`).
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]
requires-pixi = ">=0.40"

[dependencies]
python = ">=3.10,<3.15"
rust = ">=1.75"
# conda-forge package `libclang` (versioned on its own schedule; often tracks LLVM major).
# bindgen loads `$CONDA_PREFIX/lib` via LIBCLANG_PATH in [activation.env].
libclang = ">=22"
pkg-config = "*"
pip = "*"
pyarrow = ">=22"

# xbbg itself is installed via `pixi run install` (not here) because
# activation env vars are only available during `pixi run`, not `pixi install`.
[pypi-dependencies]
narwhals = ">=1.30"

[pypi-options]
extra-index-urls = ["https://blpapi.bloomberg.com/repository/releases/python/simple/"]

[activation.env]
BLPAPI_ROOT = "$PIXI_PROJECT_ROOT/vendor/blpapi-sdk"
LIBCLANG_PATH = "$CONDA_PREFIX/lib"
CARGO_TERM_COLOR = "always"
RUST_BACKTRACE = "1"

[system-requirements]
linux = "4.18"
libc = { version = "2.28", family = "glibc" }

[target.osx-arm64.activation]
env = { ARCHFLAGS = "-arch arm64" }

# ── Tasks ─────────────────────────────────────────────────────────────────────

[tasks]
install = { cmd = "pip install --no-deps -e .", env = { RUSTFLAGS = "-C target-cpu=native" }, description = "Editable install (compiles Rust extension, native CPU)" }
build = { cmd = "python -m build", description = "Build sdist + wheel" }
test = "pytest py-xbbg/tests/ -ra -v"
test-cov = "pytest py-xbbg/tests/ --cov=py-xbbg/src/xbbg --cov-report=xml -ra -v"
lint-py = "ruff check py-xbbg/src py-xbbg/tests"
lint-rs = "cargo clippy -- -D warnings"
lint = { depends-on = ["lint-py", "lint-rs"] }
typecheck = "ty check --exclude benchmarks --exclude examples --exclude scripts"
fmt-py = "ruff format py-xbbg/src py-xbbg/tests"
fmt-rs = "cargo fmt --all"
fmt = { depends-on = ["fmt-py", "fmt-rs"] }
fmt-check-py = "ruff format --check py-xbbg/src py-xbbg/tests"
fmt-check-rs = "cargo fmt --all -- --check"
fmt-check = { depends-on = ["fmt-check-py", "fmt-check-rs"] }
ci = { depends-on = ["fmt-check", "lint", "test"] }
pre-commit = "pre-commit run --all-files"
clean = "cargo clean && rm -rf dist build *.egg-info htmlcov .coverage"

# ── Features ──────────────────────────────────────────────────────────────────

[feature.test.pypi-dependencies]
pytest = ">=8.4"
pytest-asyncio = ">=0.24"
pytest-cov = "*"

[feature.lint.dependencies]
python = ">=3.10"

[feature.lint.pypi-dependencies]
ruff = ">=0.14"
ty = ">=0.0.1"

[feature.lint.tasks]
lint = "ruff check py-xbbg/src py-xbbg/tests"
fmt = "ruff format py-xbbg/src py-xbbg/tests"
fmt-check = "ruff format --check py-xbbg/src py-xbbg/tests"
typecheck = "ty check --exclude benchmarks --exclude examples --exclude scripts"

[feature.dev.pypi-dependencies]
pre-commit = ">=4.5"
build = "*"
twine = "*"
ipykernel = "*"

[feature.benchmark.dependencies]
pandas = ">=2.0"
polars = ">=0.20"

[feature.benchmark.pypi-dependencies]
pytest-benchmark = ">=4.0"
tabulate = ">=0.9"
psutil = ">=5.9"

[feature.benchmark.tasks]
bench-rs = "cargo bench --package xbbg-bench"

[feature.docs.dependencies]
nodejs = ">=24"
python = "3.12.*"

[feature.docs.pypi-dependencies]
pydoc-markdown = ">=4.8"

[feature.docs.tasks]
docs-install = { cmd = "npm ci", cwd = "docs" }
docs-dev = { cmd = "npm run dev", cwd = "docs" }
docs-check = { cmd = "npm run check", cwd = "docs", description = "Generate Python API docs, sync the changelog page, and run astro check for the public docs site" }
docs-build = { cmd = "npm run build", cwd = "docs", description = "Generate public docs content and build the Starlight site, including JS TypeDoc pages" }
docs-ci = { depends-on = ["docs-install", "docs-check", "docs-build"], description = "CI gate: install docs deps, regenerate public docs content, run astro check, then the production build" }

[feature.js.dependencies]
nodejs = ">=24"

[feature.js.tasks]
js-install = { cmd = "npm install", cwd = "js-xbbg" }
js-build = { cmd = "npm run build", cwd = "js-xbbg" }
js-lint = { cmd = "npm run lint", cwd = "js-xbbg" }
js-format = { cmd = "npm run format", cwd = "js-xbbg" }
js-test = { cmd = "npm test", cwd = "js-xbbg" }
js-test-live = { cmd = "npm run test:live", cwd = "js-xbbg" }

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"

# ── Environments ──────────────────────────────────────────────────────────────

[environments]
default = { features = ["test", "lint", "dev"], solve-group = "main" }
test = { features = ["test"], solve-group = "main" }
lint = { features = ["lint"], no-default-feature = true }
benchmark = { features = ["test", "benchmark"], solve-group = "main" }
docs = { features = ["docs"] }
py310 = { features = ["test", "py310"] }
py311 = { features = ["test", "py311"] }
py312 = { features = ["test", "py312"] }
py313 = { features = ["test", "py313"] }
py314 = { features = ["test", "py314"] }

js = { features = ["js"], solve-group = "main" }