# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]

# ════════════════════════════════════════════════════════════════════════════
# Advisories - check for known security vulnerabilities
# ════════════════════════════════════════════════════════════════════════════
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
ignore = []

# ════════════════════════════════════════════════════════════════════════════
# Licenses - ensure dependencies use acceptable licenses
# ════════════════════════════════════════════════════════════════════════════
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ════════════════════════════════════════════════════════════════════════════
# Bans - deny specific crates or versions
# ════════════════════════════════════════════════════════════════════════════
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

deny = [
    # Use parking_lot instead
    # { name = "spin" },
]

skip = []
skip-tree = []

# ════════════════════════════════════════════════════════════════════════════
# Sources - only allow crates from trusted sources
# ════════════════════════════════════════════════════════════════════════════
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
