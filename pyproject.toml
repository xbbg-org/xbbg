[build-system]
requires = ["maturin>=1.7"]
build-backend = "maturin"

[project]
name = "xbbg"
description = "Intuitive Bloomberg data API"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
  { name = "Alpha x1", email = "alpha.xone@outlook.com" },
]
classifiers = [
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dynamic = ["version"]
dependencies = [
  "narwhals>=1.30",
  "pyarrow>=22.0.0",
  "lief>=0.17",
]

[project.optional-dependencies]
# Kept for compatibility if consumers expect extras, but dev/test tooling
# is managed via uv dependency groups below.
test = ["pytest", "pytest-cov", "coverage", "codecov"]
dev = ["ruff", "ipykernel", "build", "twine", "pre-commit"]
docs = ["sphinx>=5.3.0", "sphinx-rtd-theme>=2.0.0", "sphinx-llms-txt>=0.7.0"]

[project.urls]
Homepage = "https://github.com/alpha-xone/xbbg"
Documentation = "https://xbbg.readthedocs.io/"
Source = "https://github.com/alpha-xone/xbbg"
Issues = "https://github.com/alpha-xone/xbbg/issues"

[tool.maturin]
bindings = "pyo3"
python-source = "py-xbbg/src"
module-name = "xbbg._core"
manifest-path = "crates/pyo3-xbbg/Cargo.toml"

[[tool.uv.index]]
name = "bloomberg"
url = "https://blpapi.bloomberg.com/repository/releases/python/simple/"
explicit = true

[tool.uv.sources]
blpapi = { index = "bloomberg" }

[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
  "xbbg/feeds/*",
  "feeds/**",
  "docs/_build",
  "docs/conf.py",
  "Examples.ipynb",
  "dist",
  "venv",
  ".venv",
  "backfill_changelog.py",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "D",    # pydocstyle
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "SIM",  # flake8-simplify
  "RET",  # flake8-return
  "FA",   # flake8-future-annotations
  "TCH",  # flake8-type-checking
  "PERF", # perflint
  "RUF",  # ruff-specific rules
  "PIE",  # flake8-pie
  "PT",   # flake8-pytest-style
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "D104",   # missing docstring in public package
  "D105",   # missing docstring in magic method
  "D107",   # missing docstring in __init__
  "RET504", # unnecessary assign before return
  "RET505", # unnecessary else after return
  "SIM108", # use ternary instead of if-else (readability)
  "RUF022", # unsorted __all__ (we organize by category)
  "PERF203", # try-except in loop (intentional for date parsing)
]

[tool.ruff.lint.per-file-ignores]
"py-xbbg/src/xbbg/__init__.py" = ["F401", "E402"]
"py-xbbg/src/xbbg/**/__init__.py" = ["F401"]
"py-xbbg/tests/**" = ["D", "PT"]
"xbbg/__init__.py" = ["F401"]
"xbbg/**/__init__.py" = ["F401"]
"xbbg/tests/**" = ["D"]

[tool.ruff.lint.isort]
known-first-party = ["xbbg"]
combine-as-imports = true
force-sort-within-sections = true
required-imports = ["from __future__ import annotations"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.flake8-type-checking]
runtime-evaluated-base-classes = ["pydantic.BaseModel"]






[tool.pytest.ini_options]
addopts = "-ra"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
  "error::DeprecationWarning",
  "error::PendingDeprecationWarning",
  "error::FutureWarning",
]

[dependency-groups]
dev = [
    "maturin>=1.10.0",
    "pre-commit>=4.5.1",
    "pytest>=8.4.2",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.14.10",
]
